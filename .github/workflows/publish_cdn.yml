name: Publish CDN

concurrency:
  group: publish

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3.6.0
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.CHANGELOG_BOT_DEPLOY_KEY }}

    - name: Roll up changelog parts
      run: |
        set -euo pipefail
        git remote set-url origin git@github.com:Zona-14/Zona-14.git
        git config user.name 'Zona14 Publish Bot'
        git config user.email 'changelog-bot@users.noreply.github.com'
        python -m pip install --quiet pyyaml
        git fetch origin master
        git rebase origin/master
        python Tools/update_changelog.py Resources/Changelog/Zona14.yml Resources/Changelog/Parts --category Main
        python Tools/update_changelog.py Resources/Changelog/Admin.yml  Resources/Changelog/Parts --category Admin
        python Tools/update_changelog.py Resources/Changelog/Maps.yml   Resources/Changelog/Parts --category Maps
        python Tools/update_changelog.py Resources/Changelog/Rules.yml  Resources/Changelog/Parts --category Rules
        if ! git diff --quiet -- Resources/Changelog/; then
          git add Resources/Changelog/
          git commit -m "chore(changelog): roll up parts before publish [skip ci]"
          git push origin master
        fi

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3.2.0
      with:
        dotnet-version: 9.0.x

    - name: Get Engine Tag
      run: |
        cd RobustToolbox
        git fetch --depth=1
    - name: Install dependencies
      run: dotnet restore

    - name: Build Packaging
      run: dotnet build Content.Packaging --configuration Release --no-restore /m

    - name: Package server
      run: dotnet run --project Content.Packaging server --platform win-x64 --platform linux-x64 --platform osx-x64 --platform linux-arm64

    - name: Package client
      run: dotnet run --project Content.Packaging client --no-wipe-release

    - name: Publish version
      run: Tools/publish_multi_request.py
      env:
        PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        FORK_ID: ${{ vars.FORK_ID }}
        ROBUST_CDN_URL: ${{ vars.ROBUST_CDN_URL }}

    - name: Post changelog to Discord
      if: success()
      run: python Tools/actions_changelogs_since_last_run.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}

    - name: Move changelog-last-published tag
      if: success()
      run: |
        set -euo pipefail
        git fetch origin master
        git tag -f changelog-last-published origin/master
        git push -f origin refs/tags/changelog-last-published
